# claude-dev.tmux.conf
#
# Seed tmux configuration for Claude development sessions.
# This file is copied to ~/.tmux.conf by the launcher script only 
# when ~/.tmux.conf does not already exist.
# Existing user configuration is never overwritten.

# Large scrollback for agent transcripts, bootstrap logs, diffs, tests.
set-option -gq history-limit 300000

# Mouse wheel scrolling and pane interaction.
set-option -gq mouse on

# Reduce Escape-key latency in TUIs/editors to 10ms.
set-option -sgq escape-time 10

# Allow terminal applications to receive focus events.
set-option -gq focus-events on

# Modern terminal/color behavior.
set-option -gq default-terminal "tmux-256color"
set-option -asq terminal-features ",xterm-256color:RGB"
set-option -asq terminal-features ",xterm*:RGB"
set-option -asq terminal-features ",xterm-ghostty:RGB"

# Vi-style copy mode for scrolling/searching/selecting logs
# Not enabled by default. Uncomment to enable.
# set-window-option -gq mode-keys vi

# Keep failed panes visible for inspection.
# Not enabled by default. Uncomment to enable.
# Exiting the dead pane is Ctrl-b, then x, then y+Enter to confirm.
# set-window-option -gq remain-on-exit failed

# Avoid terminal escape sequences from the session mutating host clipboard,
# window names, titles, or passthrough behavior.
set-option -gq set-clipboard off
set-window-option -gq allow-passthrough off
set-window-option -gq allow-rename off
set-window-option -gq allow-set-title off

# Minimal status line.
set-option -gq status on
set-option -gq status-left '[#S] '
set-option -gq status-right '%Y-%m-%d %H:%M'
