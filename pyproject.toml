[project]
name = "scripts"
version = "0.1.0"
description = "A collection of utility scripts to process and optimize files."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1.8",
    "sh>=2.2.1",
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "pytest-cov>=6.0.0",
]

[tool.pytest.ini_options]
addopts = "--cov=. --cov-config=.coveragerc --cov-report html"
